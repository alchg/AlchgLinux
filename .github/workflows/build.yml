# This is a basic workflow to help you get started with Actions

name: build iso

# Controls when the workflow will run
on:
  schedule:
    - cron: "0 0 1 * *"
  push:
    branches: 
      - main
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    container:
      image: archlinux:base
      options: --privileged
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Fix for locale
        run: sed -i 's/^NoExtract/#NoExtract/' /etc/pacman.conf
                
      - name: Install packages
        run: pacman -Syyu --noconfirm libisoburn mtools dosfstools squashfs-tools arch-install-scripts grub
     
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: checkout
        uses: actions/checkout@v4

      - name: Build
        run: ./build.sh

      - name: Set Variables
        run: |
          echo "TAG=$(date '+%Y-%m-%d')" >> $GITHUB_ENV
          echo "FILE=$(ls archlive/out/alchg*iso)" >> $GITHUB_ENV
        
      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
            repo_token: ${{ secrets.GITHUB_TOKEN }}
            file: ${{ env.FILE }}
            tag: ${{ env.TAG }}
            overwrite: true
            body: "Scheduled update."

      - name: Upload sha256sum to release
        uses: svenstaro/upload-release-action@v2
        with:
            repo_token: ${{ secrets.GITHUB_TOKEN }}
            file: archlive/out/sha256sum.txt
            tag: ${{ env.TAG }}
            overwrite: true
            body: "Scheduled update."
